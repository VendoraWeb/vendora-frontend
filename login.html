<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendora | Sign In</title>
  <meta name="description" content="Sign in or create a Vendora account to browse stores, manage your shop, or administer the platform.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav id="main-navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">V</div>
      <span class="nav-logo-text">Vendora</span>
    </a>
    <div style="flex:1;"></div>
    <div class="nav-actions">
      <a href="index.html" style="font-size:13px;color:#94A3B8;padding:7px 14px;border-radius:6px;transition:all 0.18s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#94A3B8'">Katalog</a>
      <a href="login.html" style="padding:7px 16px;border:1.5px solid var(--primary);color:var(--primary);border-radius:6px;font-size:13px;font-weight:600;transition:all 0.18s;" onmouseover="this.style.background='var(--primary)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='var(--primary)'">Masuk / Daftar</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand Logo inside card -->
      <div class="auth-card-logo">
        <div class="logo-icon-lg">V</div>
        <div class="brand-name">Vendora</div>
      </div>

      <!-- Alert Feedback -->
      <div id="alert-container"></div>

      <!-- Tab Switcher -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-signin" role="tab" aria-selected="true" aria-controls="signin-view">Sign In</button>
        <button class="auth-tab" id="tab-signup" role="tab" aria-selected="false" aria-controls="signup-view">Create Account</button>
      </div>

      <!-- ========== SIGN IN VIEW ========== -->
      <div id="signin-view" class="auth-view" role="tabpanel">
        <h2>Welcome back</h2>
        <p class="auth-subtitle">Sign in to manage your shop or discover products.</p>

        <!-- Google Login -->
        <button id="google-login-btn" class="btn-google" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91c1.7-1.56 2.69-3.86 2.69-6.6z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.91-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.95v2.3A9 9 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.96 10.69A5.4 5.4 0 0 1 3.68 9c0-.59.1-1.17.28-1.69V5.01H.95A8.99 8.99 0 0 0 0 9c0 1.5.37 2.92 1.02 4.18l2.94-2.49z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.1A8.99 8.99 0 0 0 9 0 9 9 0 0 0 .95 5.01l2.98 2.49c.72-2.13 2.7-3.71 5.04-3.71z"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider">
          <hr><span>or</span><hr>
        </div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" class="form-control" placeholder="name@domain.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary" id="signin-submit-btn" style="width: 100%; margin-top: 6px; padding: 13px;">
            Sign In
          </button>
        </form>

        <p class="auth-toggle-link">
          New to Vendora? <a href="#" id="to-signup-link">Create a free account</a>
        </p>
      </div>

      <!-- ========== SIGN UP VIEW ========== -->
      <div id="signup-view" class="auth-view" style="display: none;" role="tabpanel">
        <h2>Create your account</h2>
        <p class="auth-subtitle">Join as a buyer, seller, or platform admin.</p>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="form-control" placeholder="e.g. Budi Santoso" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" class="form-control" placeholder="name@domain.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="reg-role">I want to join as a:</label>
            <select id="reg-role" class="form-control" required>
              <option value="buyer">Buyer — Browse &amp; purchase products</option>
              <option value="seller">Seller — Rent a shop &amp; sell items</option>
              <option value="admin">Admin — Manage the platform</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" id="signup-submit-btn" style="width: 100%; margin-top: 6px; padding: 13px;">
            Create Account
          </button>
        </form>

        <p class="auth-toggle-link">
          Already have an account? <a href="#" id="to-signin-link">Sign in here</a>
        </p>
      </div>

    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
